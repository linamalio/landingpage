<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lina MaLio – Second Hand Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:    #1a1108;
      --warm-1: #2e1c0d;
      --warm-2: #5a3620;
      --warm-3: #8c5630;
      --warm-4: #ba7d4a;
      --warm-5: #d9a876;
      --warm-6: #eecfa4;
      --warm-7: #f8edd8;
      --warm-8: #fdf6ec;
      --cream:  #faf4e8;
      --accent: #ba7d4a;
      --accent-h: #9e6438;
      --white:  #ffffff;
      --live-pink: #ff3c6e;
      --live-glow: rgba(255,60,110,0.22);
      --ig-purple: #833ab4;
      --ig-orange: #fd1d1d;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
    }

    ::selection { background: var(--warm-4); color: #fff; }

    /* ── CURSOR GLOW ── */
    #cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(186,125,74,0.09) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: transform 0.08s linear;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 0 40px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.4s, box-shadow 0.4s;
    }

    nav.scrolled {
      background: rgba(250,244,232,0.93);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(90,54,32,0.12);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 44px;
      width: 44px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--warm-5);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-text .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--warm-1);
      letter-spacing: 0.02em;
    }

    .logo-text .sub {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--warm-4);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Nav logo text: always readable regardless of scroll state */
    nav:not(.scrolled) .logo-text .name { color: #fff; }
    nav:not(.scrolled) .logo-text .sub  { color: var(--warm-5); }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--warm-2);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s;
    }

    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }

    .nav-links .nav-live {
      background: var(--live-pink);
      color: #fff !important;
      padding: 7px 16px;
      border-radius: 100px;
      font-weight: 600;
      letter-spacing: 0.06em;
      animation: livePulse 2.2s ease-in-out infinite;
      text-decoration: none;
    }

    .nav-links .nav-live::before {
      content: '● ';
      font-size: 0.6em;
    }

    .nav-links .nav-live::after { display: none; }

    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--live-glow); }
      50% { box-shadow: 0 0 0 8px rgba(255,60,110,0); }
    }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      border-radius: 8px;
      z-index: 310;
      position: relative;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* Hamburger color: white on dark hero, dark on light backgrounds */
    nav:not(.scrolled) .hamburger span { background: #fff; }
    nav.scrolled .hamburger span       { background: var(--warm-1); }

    /* Animated X when open */
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── MOBILE MENU OVERLAY ── */
    @media (max-width: 860px) {
      .hamburger { display: flex; }

      /* Overlay: hidden by default, no blur ever */
      #mobileMenuOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(30, 15, 5, 0.5);
        z-index: 290;
      }

      /* Nav menu: completely hidden by default */
      .nav-links {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: #ffffff;
        flex-direction: column;
        justify-content: flex-start;
        gap: 0;
        padding: 0 0 24px;
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -8px 40px rgba(30,15,5,0.18);
        z-index: 300;
        max-height: 85vh;
        overflow-y: auto;
      }

      /* Only shown when JS adds .menu-visible */
      .nav-links.menu-visible {
        display: flex;
      }

      #mobileMenuOverlay.menu-visible {
        display: block;
      }

      .nav-links::before {
        content: '';
        display: block;
        width: 40px; height: 4px;
        background: #ddd;
        border-radius: 2px;
        margin: 12px auto 4px;
        flex-shrink: 0;
      }

      .nav-links li {
        width: 100%;
        border-bottom: 1px solid #f0ebe3;
      }

      .nav-links li:last-child { border-bottom: none; }

      .nav-links a {
        display: flex;
        align-items: center;
        padding: 16px 28px;
        font-size: 1rem;
        color: var(--warm-1) !important;
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .nav-links a::after { display: none; }

      .nav-links .nav-live {
        margin: 16px 28px 8px;
        display: inline-flex !important;
        justify-content: center;
        border-radius: 12px !important;
        padding: 15px 28px !important;
        font-size: 0.95rem !important;
        animation: livePulse 2.2s ease-in-out infinite;
      }
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      background: var(--warm-1);
    }

    .hero-canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hero-canvas .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
    }

    .blob-1 {
      width: 600px; height: 600px;
      background: var(--warm-3);
      top: -120px; right: -80px;
      animation: blobFloat 8s ease-in-out infinite;
    }

    .blob-2 {
      width: 400px; height: 400px;
      background: var(--warm-4);
      bottom: -100px; left: -60px;
      animation: blobFloat 10s ease-in-out infinite reverse;
    }

    .blob-3 {
      width: 250px; height: 250px;
      background: #c06040;
      top: 40%; left: 50%;
      animation: blobFloat 7s ease-in-out infinite 2s;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.06); }
    }

    .hero-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.015) 40px,
        rgba(255,255,255,0.015) 41px
      );
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1120px;
      margin: 0 auto;
      padding: 120px 40px 80px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 60px;
      align-items: center;
      width: 100%;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(217,168,118,0.4);
      color: var(--warm-5);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 30px;
      backdrop-filter: blur(4px);
    }

    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--warm-5);
      animation: blink 1.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 5.2rem);
      font-weight: 300;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--warm-5);
      font-weight: 300;
    }

    .hero h1 strong {
      display: block;
      font-weight: 600;
      font-style: normal;
    }

    .hero-desc {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.62);
      line-height: 1.85;
      max-width: 420px;
      margin-bottom: 44px;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 6px 24px rgba(186,125,74,0.38);
    }

    .btn-primary:hover {
      background: var(--accent-h);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(186,125,74,0.48);
      color: #fff;
      text-decoration: none;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.55);
      color: #fff;
      transform: translateY(-2px);
      text-decoration: none;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-orb {
      position: relative;
      width: clamp(240px, 36vw, 400px);
      height: clamp(240px, 36vw, 400px);
    }

    .hero-orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(217,168,118,0.2);
      animation: orbSpin 20s linear infinite;
    }

    .hero-orb-ring::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warm-5);
      transform: translateX(-50%);
    }

    .hero-orb-ring-2 {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(217,168,118,0.12);
      animation: orbSpin 14s linear infinite reverse;
    }

    @keyframes orbSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero-orb-img {
      position: absolute;
      inset: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hero-orb-img img {
      width: 74%;
      height: 74%;
      object-fit: contain;
      border-radius: 50%;
    }

    .hero-stats {
      position: absolute;
      bottom: -30px;
      right: -20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-pill {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
    }

    .stat-pill strong {
      color: var(--warm-5);
    }

    @media (max-width: 768px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 48px;
        padding: 110px 24px 60px;
      }
      .hero-visual { order: -1; }
      .hero-orb { width: 200px; height: 200px; }
      .hero-desc { max-width: 100%; }
      .hero-btns { justify-content: center; }
      .hero-stats { position: static; flex-direction: row; flex-wrap: wrap; justify-content: center; margin-top: 16px; }
    }

    /* ── FEATURES RIBBON ── */
    .ribbon {
      background: var(--warm-2);
      overflow: hidden;
      padding: 14px 0;
    }

    .ribbon-track {
      display: flex;
      gap: 0;
      animation: ribbonScroll 28s linear infinite;
      width: max-content;
    }

    .ribbon-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 48px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-6);
      white-space: nowrap;
    }

    .ribbon-item .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--warm-4);
      flex-shrink: 0;
    }

    @keyframes ribbonScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ── SECTIONS ── */
    .section-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 100px 40px;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .label::before {
      content: '';
      width: 24px; height: 1px;
      background: var(--accent);
    }

    h2.section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 400;
      color: var(--warm-1);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    h2.section-title em { font-style: italic; color: var(--accent); }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      margin-top: 56px;
    }

    .about-body {
      font-size: 1rem;
      font-weight: 300;
      color: var(--warm-3);
      line-height: 1.9;
      margin-top: 20px;
    }

    .about-quote-card {
      background: var(--warm-1);
      border-radius: 20px;
      padding: 52px 44px;
      position: relative;
      overflow: hidden;
    }

    .about-quote-card::before {
      content: '\201C';
      position: absolute;
      top: -10px; right: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 180px;
      color: rgba(217,168,118,0.12);
      line-height: 1;
      pointer-events: none;
    }

    .about-quote-card blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      line-height: 1.65;
      position: relative;
    }

    .about-quote-card cite {
      display: block;
      margin-top: 22px;
      font-size: 0.75rem;
      font-style: normal;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-5);
    }

    @media (max-width: 768px) {
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
    }

    /* ── WHY CARDS ── */
    .why-bg {
      background: var(--warm-8);
      border-top: 1px solid var(--warm-6);
      border-bottom: 1px solid var(--warm-6);
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 52px;
    }

    .why-card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      border: 1px solid var(--warm-6);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .why-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--warm-4), var(--warm-5));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s;
    }

    .why-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(90,54,32,0.1);
    }

    .why-card:hover::after { transform: scaleX(1); }

    .why-icon {
      font-size: 1.8rem;
      margin-bottom: 20px;
      display: block;
    }

    .why-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--warm-1);
      margin-bottom: 10px;
    }

    .why-card p {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--warm-3);
      line-height: 1.75;
    }

    @media (max-width: 900px) { .why-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .why-grid { grid-template-columns: 1fr; } }

    /* ── LIVE SHOWS HERO SECTION ── */
    .live-section {
      background: var(--warm-1);
      position: relative;
      overflow: hidden;
      padding: 90px 0;
    }

    .live-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 80% at 80% 50%, rgba(255,60,110,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 60% at 15% 60%, rgba(186,125,74,0.25) 0%, transparent 70%);
    }

    .live-inner {
      position: relative;
      z-index: 2;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .live-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,60,110,0.2);
      border: 1px solid rgba(255,60,110,0.4);
      color: #ff7aa0;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--live-pink);
      animation: blink 1.5s step-end infinite;
      box-shadow: 0 0 0 3px rgba(255,60,110,0.25);
    }

    .live-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 40px;
      margin-top: 48px;
      align-items: stretch;
    }

    .live-card-main {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,60,110,0.3);
      border-radius: 24px;
      padding: 44px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .live-card-main:hover {
      border-color: rgba(255,60,110,0.6);
      transform: translateY(-4px);
    }

    .live-card-main::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,60,110,0.15), transparent 60%);
      pointer-events: none;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--live-pink);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      animation: livePulse 2.2s ease-in-out infinite;
    }

    .live-badge::before {
      content: '●';
      font-size: 0.55em;
    }

    .live-card-main h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .live-handle {
      font-size: 0.88rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      margin-bottom: 18px;
      letter-spacing: 0.04em;
    }

    .live-card-main p {
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .live-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 32px;
      background: var(--live-pink);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 8px 30px rgba(255,60,110,0.35);
    }

    .live-btn:hover {
      background: #e02055;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(255,60,110,0.5);
      color: #fff;
      text-decoration: none;
    }

    .ig-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);

      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .ig-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(131,58,180,0.12), rgba(253,29,29,0.08) 60%, transparent 100%);
      border-radius: 24px;
    }

    .ig-card:hover {
      border-color: rgba(253,29,29,0.4);
      transform: translateY(-4px);
    }

    .ig-icon-wrap {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--ig-purple), var(--ig-orange));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      position: relative;
    }

    .ig-icon-wrap svg {
      width: 26px; height: 26px;
      fill: #fff;
      position: relative;
    }

    .ig-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 400;
      color: #fff;
      margin-bottom: 6px;
    }

    .ig-card .ig-handle {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 16px;
    }

    .ig-card p {
      font-size: 0.92rem;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      line-height: 1.8;
      margin-bottom: 28px;
      position: relative;
    }

    .ig-follow-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      background: linear-gradient(135deg, var(--ig-purple), var(--ig-orange));
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 6px 22px rgba(131,58,180,0.3);
      position: relative;
    }

    .ig-follow-btn:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="cursor-glow"></div>

  <nav>
    <a href="#" class="logo">
      <img src="https://via.placeholder.com/44" alt="Logo" />
      <div class="logo-text">
        <span class="name">Lina MaLio</span>
        <span class="sub">Mode</span>
      </div>
    </a>

    <button class="hamburger" id="hamburgerBtn">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Kontakt</a></li>
      <li><a href="#live" class="nav-live">Live</a></li>
    </ul>
  </nav>

  <div id="mobileMenuOverlay"></div>

  <section class="hero" id="home">
    <div class="hero-canvas">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div class="hero-inner">
      <div>
        <div class="hero-tag">
          <span>Nachhaltige Mode</span>
        </div>
        <h1>Second Hand <em>Mode</em> <strong>neu definiert</strong></h1>
        <p class="hero-desc">
          Entdecke einzigartige, nachhaltige Secondhand-Pieces, die deinen persönlichen Stil unterstreichen.
        </p>
        <div class="hero-btns">
          <a href="#" class="btn-primary">Shop Now</a>
          <a href="#" class="btn-ghost">Learn More</a>
        </div>
      </div>
      <div class="hero-visual">
        <div class="hero-orb">
          <div class="hero-orb-ring"></div>
          <div class="hero-orb-ring-2"></div>
          <div class="hero-orb-img">
            <img src="https://via.placeholder.com/300" alt="Fashion" />
          </div>
          <div class="hero-stats">
            <div class="stat-pill"><strong>150+</strong> Items</div>
            <div class="stat-pill"><strong>50%</strong> Savings</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const navLinks = document.getElementById('navLinks');
    const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

    hamburgerBtn.addEventListener('click', () => {
      hamburgerBtn.classList.toggle('active');
      navLinks.classList.toggle('menu-visible');
      mobileMenuOverlay.classList.toggle('menu-visible');
    });

    // Close menu when overlay is clicked
    mobileMenuOverlay.addEventListener('click', () => {
      hamburgerBtn.classList.remove('active');
      navLinks.classList.remove('menu-visible');
      mobileMenuOverlay.classList.remove('menu-visible');
    });

    // Cursor glow effect
    const cursorGlow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', (e) => {
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
    });

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      nav.classList.toggle('scrolled', window.scrollY > 0);
    });
  </script>
</body>
</html>
